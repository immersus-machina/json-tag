name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-csharp:
    name: C#
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - run: dotnet run --project test/JsonTag.Test
        working-directory: csharp
      - run: dotnet run --project test/TransitiveTest/App.Test
        working-directory: csharp

  test-fsharp:
    name: F#
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - run: dotnet run --project test/JsonTag.FSharp.Test
        working-directory: fsharp

  test-typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
        working-directory: typescript
      - run: npm test
        working-directory: typescript

  test-rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
        working-directory: rust

  test-haskell:
    name: Haskell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6'
      - run: cabal update && cabal test
        working-directory: haskell

  test-ocaml:
    name: OCaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '4.14'
      - run: opam install yojson alcotest -y
      - run: eval $(opam env) && dune test
        working-directory: ocaml

  test-java:
    name: Java
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - run: mvn test -q
        working-directory: java

  test-kotlin:
    name: Kotlin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - run: gradle test
        working-directory: kotlin

  test-scala:
    name: Scala
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - run: |
          curl -fL https://github.com/sbt/sbt/releases/download/v1.10.6/sbt-1.10.6.tgz | tar xz -C /tmp
          echo "/tmp/sbt/bin" >> $GITHUB_PATH
      - run: sbt test
        working-directory: scala

  test-python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[test]"
        working-directory: python
      - run: pytest test/ -v
        working-directory: python

  test-gleam:
    name: Gleam
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '26'
          gleam-version: '1.9'
      - run: gleam test
        working-directory: gleam

  test-swift:
    name: Swift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.1'
      - run: swift test
        working-directory: swift
